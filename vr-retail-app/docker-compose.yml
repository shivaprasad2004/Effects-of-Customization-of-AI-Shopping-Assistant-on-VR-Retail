version: '3.9'
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vr-frontend
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://backend:5000
      - VITE_AI_SERVICE_URL=http://ai-service:8000
      - VITE_SOCKET_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vr-backend
    ports:
      - '5000:5000'
    env_file: .env.example
    environment:
      - MONGODB_URI=mongodb://mongo:27017/vr-retail
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URI=postgresql://vruser:vrpass@postgres:5432/vrretail
      - AI_SERVICE_URL=http://ai-service:8000
      - CLIENT_URL=http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: vr-ai-service
    ports:
      - '8000:8000'
    env_file: .env.example
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./ai-service:/app
      - ai_models:/app/models/weights

  mongo:
    image: mongo:7.0
    container_name: vr-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=vr-retail
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:16-alpine
    container_name: vr-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=vruser
      - POSTGRES_PASSWORD=vrpass
      - POSTGRES_DB=vrretail
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vruser -d vrretail']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: vr-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vr-nginx
    ports:
      - '80:80'
    depends_on:
      - frontend
      - backend
      - ai-service
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo_data:
  postgres_data:
  redis_data:
  ai_models:
  uploads:
