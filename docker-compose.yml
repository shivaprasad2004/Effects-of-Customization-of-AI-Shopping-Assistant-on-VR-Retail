version: '3.9'

services:
  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vr-frontend
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_AI_SERVICE_URL=http://localhost:8000
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ── Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vr-backend
    ports:
      - '5000:5000'
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/vr-retail
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URI=postgresql://vruser:vrpass@postgres:5432/vrretail
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads

  # ── AI Service ───────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: vr-ai-service
    ports:
      - '8000:8000'
    env_file: .env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./ai-service:/app
      - ai_models:/app/models/weights

  # ── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: vr-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_DATABASE=vr-retail
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vr-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=vruser
      - POSTGRES_PASSWORD=vrpass
      - POSTGRES_DB=vrretail
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vruser -d vrretail']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: vr-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ── Recommendation Engine ────────────────────────────────
  recommendation-engine:
    build:
      context: ./recommendation-engine
      dockerfile: Dockerfile
    container_name: vr-recommendation
    ports:
      - '8081:8081'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8081/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Emotion Recognition ─────────────────────────────────
  emotion-recognition:
    build:
      context: ./emotion-recognition-system
      dockerfile: Dockerfile
    container_name: vr-emotion
    ports:
      - '8082:8082'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8082/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Blockchain Payment ──────────────────────────────────
  blockchain-payment:
    build:
      context: ./blockchain-payment-system
      dockerfile: Dockerfile
    container_name: vr-blockchain-payment
    ports:
      - '8083:8083'
    environment:
      - RPC_URL=http://hardhat-node:8545
    restart: unless-stopped

  # ── Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vr-nginx
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - frontend
      - backend
      - ai-service
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  mongo_data:
  postgres_data:
  redis_data:
  ai_models:
  uploads:
